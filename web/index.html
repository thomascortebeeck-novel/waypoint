<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Discover and plan your next adventure with Waypoint - Hiking, cycling, city trips, and more.">
  <meta name="keywords" content="adventure travel, hiking, cycling, city trips, travel planning, waypoint">
  <meta name="author" content="Waypoint">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Waypoint">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon (favicon_io package: .ico for broad support, PNG fallback) -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"/>

  <title>Waypoint - Plan Your Next Adventure</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts: DM Sans + DM Serif Display (web; mobile/desktop use local assets from pubspec) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <!-- Mapbox GL JS - Styles for user location pulse animation -->
  <style>
    /* Mapbox marker pulse animation */
    @keyframes waypoint-pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(66, 133, 244, 0.5);
      }
      70% {
        box-shadow: 0 0 0 12px rgba(66, 133, 244, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(66, 133, 244, 0);
      }
    }
    
    .waypoint-marker {
      transition: transform 0.2s ease;
    }
    
    .waypoint-marker:hover {
      transform: scale(1.1);
    }
    
    /* POI annotation markers */
    .waypoint-annotation-marker {
      z-index: 1000 !important;
      position: relative;
      pointer-events: auto; /* Marker can receive clicks */
    }
    
    .waypoint-annotation-marker:hover {
      transform: scale(1.2);
      z-index: 1001 !important;
    }
    
    /* Ensure map canvas can receive clicks even when markers are present */
    .mapboxgl-canvas {
      pointer-events: auto !important;
    }
    
    /* Map container should always receive clicks */
    .mapboxgl-map {
      pointer-events: auto !important;
    }
    
    /* Material Icons font for POI icons */
    @font-face {
      font-family: 'Material Icons';
      font-style: normal;
      font-weight: 400;
      src: url(https://fonts.gstatic.com/s/materialicons/v142/flUhRq6tzZclQEJ-Vdg-IuiaDsNc.woff2) format('woff2');
    }
  </style>
  
  <!-- Google Maps JavaScript API: only load when key is set (CI substitutes YOUR_GOOGLE_MAPS_API_KEY in build; local dev skips to avoid InvalidKey) -->
  <script>
    (function() {
      var key = 'YOUR_GOOGLE_MAPS_API_KEY';
      if (key && key !== 'YOUR_GOOGLE_MAPS_API_KEY') {
        var s = document.createElement('script');
        s.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places,geometry,marker&loading=async';
        s.async = true;
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>
  
  <!-- Suppress non-critical and verbose logs in console -->
  <script>
    // Filter out AssetManifest.json / asset bundle errors and Firebase Firestore debug logs.
    (function() {
      const originalLog = console.log;
      const originalWarn = console.warn;
      const originalError = console.error;
      function shouldSuppressAssetError(message) {
        if (!message || typeof message !== 'string') return false;
        return message.includes('AssetManifest.json') ||
          message.includes('AssetManifest') ||
          (message.includes('Unable to load asset') && (message.includes('asset') || message.includes('Asset'))) ||
          message.includes('asset does not exist') ||
          (message.includes('google_fonts') && message.includes('Unable to load asset')) ||
          message.includes('EncodingError') ||
          message.includes('source image cannot be decoded');
      }
      function isFirebaseFirestoreLog(message) {
        if (!message || typeof message !== 'string') return false;
        return message.indexOf('@firebase/firestore') !== -1;
      }
      function isNotoFontsWarning(message) {
        if (!message || typeof message !== 'string') return false;
        return message.indexOf('Noto fonts') !== -1 && message.indexOf('missing characters') !== -1;
      }
      function shouldSuppress(args) {
        const message = args.map(function(a) {
          if (a && typeof a === 'object' && a.message) return a.message;
          return String(a);
        }).join(' ');
        return shouldSuppressAssetError(message) || isFirebaseFirestoreLog(message) || isNotoFontsWarning(message);
      }
      console.log = function(...args) {
        if (shouldSuppress(args)) return;
        originalLog.apply(console, args);
      };
      console.warn = function(...args) {
        if (shouldSuppress(args)) return;
        originalWarn.apply(console, args);
      };
      console.error = function(...args) {
        if (shouldSuppress(args)) return;
        originalError.apply(console, args);
      };
      // Suppress "Uncaught (in promise) DartError..." for asset manifest
      window.addEventListener('unhandledrejection', function(event) {
        var msg = '';
        if (event.reason != null) {
          msg = typeof event.reason.message === 'string'
            ? event.reason.message
            : (typeof event.reason.toString === 'function' ? event.reason.toString() : String(event.reason));
        } else {
          msg = String(event.reason);
        }
        if (shouldSuppressAssetError(msg)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
