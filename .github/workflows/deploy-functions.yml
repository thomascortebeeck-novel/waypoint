name: Deploy Firebase Cloud Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install function dependencies
      - name: Install Dependencies
        working-directory: ./functions
        run: npm install

      # 4. Build TypeScript to JavaScript
      - name: Build Functions
        working-directory: ./functions
        run: npm run build
      
      # 4.5. Verify build output
      - name: Verify Build Output
        working-directory: ./functions
        run: |
          echo "📦 Checking compiled functions..."
          ls -la lib/
          echo ""
          echo "📝 Contents of lib/index.js:"
          head -20 lib/index.js || echo "⚠️ index.js not found!"

      # 5. Install Firebase CLI globally
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      # 6. Install Google Cloud SDK and authenticate with firebase-adminsdk (FIREBASE_SERVICE_ACCOUNT)
      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Setup Google Cloud Credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}

      # 6.6. Verify APIs are enabled (read-only check, should work even without enable permissions)
      - name: Verify Required APIs
        run: |
          echo "🔧 Verifying required APIs are enabled..."
          gcloud services list --enabled --project=${{ secrets.FIREBASE_PROJECT_ID }} --filter="name:cloudfunctions.googleapis.com OR name:cloudbuild.googleapis.com OR name:artifactregistry.googleapis.com" --format="table(name)" || echo "⚠️ Could not list services, but continuing..."
          echo "✅ API verification complete (APIs should already be enabled)"

      # 6.7. Set Stripe secrets in Google Cloud Secret Manager (firebase-adminsdk needs Secret Manager Admin role)
      - name: Set Stripe secrets for deployment
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY_LIVE }}"
            WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET_LIVE }}"
          else
            SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY_TEST }}"
            WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}"
          fi
          if [ -z "$SECRET_KEY" ]; then
            SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY_TEST }}"
            WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}"
          fi
          if [ -n "$SECRET_KEY" ]; then
            echo -n "$SECRET_KEY" | firebase functions:secrets:set STRIPE_SECRET_KEY --data-file=- --project ${{ secrets.FIREBASE_PROJECT_ID }}
          fi
          if [ -n "$WEBHOOK_SECRET" ]; then
            echo -n "$WEBHOOK_SECRET" | firebase functions:secrets:set STRIPE_WEBHOOK_SECRET --data-file=- --project ${{ secrets.FIREBASE_PROJECT_ID }}
          fi

      # 7. Create .env file (NOT .env.yaml!) - Firebase expects KEY=value format
      - name: Create Environment Variables File
        working-directory: ./functions
        run: |
          echo "GOOGLE_PLACES_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" > .env
          echo "MAPBOX_SECRET_TOKEN=${{ secrets.MAPBOX_SECRET_TOKEN }}" >> .env
          # Do NOT add OPENROUTER_API_KEY here: generateAdventureContext gets it from Secret Manager.
          # Putting it in .env would cause "Secret env var overlaps non-secret" on deploy.
          echo "✅ Created .env file"
          echo "📄 Verification:"
          ls -la .env
          echo "Lines in file: $(wc -l < .env)"
          echo "File contents (values redacted):"
          cat .env | sed 's/=.*/=***/'

      # 8. Verify .env exists
      - name: Verify Environment File
        working-directory: ./functions
        run: |
          if [ -f .env ]; then
            echo "✅ .env found in functions/"
            echo "📄 File size: $(wc -c < .env) bytes"
            echo "📄 Line count: $(wc -l < .env)"
          else
            echo "❌ ERROR: .env not found!"
            exit 1
          fi

      # 9. Deploy Cloud Functions
      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          echo "🚀 Starting deployment..."
          echo "📋 Project: ${{ secrets.FIREBASE_PROJECT_ID }}"
          echo "📂 Checking .env file exists:"
          ls -la functions/.env && echo "✅ .env file found" || echo "❌ .env missing"
          echo ""
          echo "🔐 Verifying gcloud authentication..."
          gcloud config get-value project || echo "⚠️ Project not set, but continuing..."
          echo "✅ Ready to deploy"
          echo ""
          # Deploy with explicit project to avoid API enablement checks
          firebase deploy --only functions \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive \
            --force \
            --debug || (echo "❌ Deployment failed. Check logs above." && exit 1)

      # 10. Cleanup sensitive files
      - name: Cleanup Credentials
        if: always()
        run: |
          rm -f /tmp/gcp-key.json
          rm -f functions/.env
          rm -f functions/.env.yaml

      # 11. Success notification
      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Cloud Functions deployed successfully!"
          echo "📊 View logs: https://console.firebase.google.com/project/${{ secrets.FIREBASE_PROJECT_ID }}/functions"
          echo "🔍 Functions deployed:"
          echo "  - placesSearch (Google Places)"
          echo "  - placeDetails (Google Places)"
          echo "  - geocodeAddress (Google Places)"
          echo "  - placePhoto (Google Places)"
          echo "  - getDirections (Mapbox)"
          echo "  - matchRoute (Mapbox)"
          echo "  - getElevationProfile (Mapbox)"
          echo "  - fetchMeta (Link previews)"

      # 12. Failure notification
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above for details."
          echo ""
          echo "Common issues:"
          echo "  1. Check Firebase Service Account JSON is valid"
          echo "  2. Verify API keys (GOOGLE_PLACES_API_KEY, MAPBOX_SECRET_TOKEN) are set in GitHub Secrets"
          echo "  3. Ensure functions/package.json has correct dependencies"
          echo "  4. If you see '403' or 'permission' errors:"
          echo "     - Service Usage: roles/serviceusage.serviceUsageConsumer"
          echo "     - Cloud Scheduler (cleanupPendingOrders): roles/cloudscheduler.admin"
          echo "     - See: .github/DEPLOYMENT_PERMISSIONS.md"
