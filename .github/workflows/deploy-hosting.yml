name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    # No path filter: every push to main updates Hosting so all domains (.web.app, .firebaseapp.com, waypoint.tours) serve the latest release.
  workflow_dispatch: # Manual run from Actions tab

jobs:
  deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build web
        run: flutter build web

      - name: Verify build output
        run: |
          ls -la build/web
          test -f build/web/index.html || (echo "Missing build/web/index.html — build may have failed" && exit 1)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Firebase Hosting deployed successfully!"
          echo "🌐 Live at: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
          echo "📋 Console: https://console.firebase.google.com/project/${{ secrets.FIREBASE_PROJECT_ID }}/hosting"
