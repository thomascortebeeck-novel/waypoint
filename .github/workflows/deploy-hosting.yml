name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    # No path filter: every push to main updates Hosting so all domains (.web.app, .firebaseapp.com, waypoint.tours) serve the latest release.
  workflow_dispatch: # Manual run from Actions tab

jobs:
  deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # No version pin — pubspec.yaml constrains google_fonts to <6.2.0, blocking the FontWeight const bug

      - name: Clean and install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Create firebase_options.dart from secret (optional)
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
            # Fail only if a FirebaseOptions apiKey is set to the placeholder (not when the string appears in isPlaceholder getter).
            if grep -q "apiKey: 'REPLACE_VIA_FIREBASE_OPTIONS_DART'" lib/firebase_options.dart; then
              echo "::error::FIREBASE_OPTIONS_DART secret contains placeholder. The deployed site would fail to load. Use real Firebase config: run 'flutterfire configure' locally, then paste the contents of lib/firebase_options.dart into the repo secret (or leave the secret unset to use the config committed in the repo)."
              exit 1
            fi
          else
            echo "::warning::FIREBASE_OPTIONS_DART secret not set; using committed lib/firebase_options.dart. Ensure it has real web config for production."
          fi

      - name: Build web
        env:
          MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          EXTRA_DEFINES=""
          if [ -n "$MAPBOX_PUBLIC_TOKEN" ]; then EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=MAPBOX_PUBLIC_TOKEN=$MAPBOX_PUBLIC_TOKEN"; fi
          MAPS_KEY="$GOOGLE_MAPS_API_KEY"
          if [ -z "$MAPS_KEY" ] && [ -n "$GOOGLE_PLACES_API_KEY" ]; then MAPS_KEY="$GOOGLE_PLACES_API_KEY"; fi
          if [ -n "$MAPS_KEY" ]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=GOOGLE_MAPS_API_KEY=$MAPS_KEY"
            echo "Building web with GOOGLE_MAPS_API_KEY (dart-define) so Dart loader uses the same key."
          fi
          flutter build web $EXTRA_DEFINES

      - name: Substitute Google Maps API key in built web
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          MAPS_KEY="$GOOGLE_MAPS_API_KEY"
          if [ -z "$MAPS_KEY" ] && [ -n "$GOOGLE_PLACES_API_KEY" ]; then MAPS_KEY="$GOOGLE_PLACES_API_KEY"; fi
          if [ -z "$MAPS_KEY" ]; then
            echo "::error::Google Maps on the deployed web app require an API key. Add repo secret GOOGLE_MAPS_API_KEY (or GOOGLE_PLACES_API_KEY) in Settings → Secrets and variables → Actions. Enable Maps JavaScript API and restrict the key to your domain (e.g. waypoint.tours)."
            exit 1
          fi
          sed -i "s/YOUR_GOOGLE_MAPS_API_KEY/$MAPS_KEY/g" build/web/index.html
          echo "Google Maps API key substituted in build/web/index.html."
          if grep -q "YOUR_GOOGLE_MAPS_API_KEY" build/web/index.html; then
            echo "::error::Substitution failed: index.html still contains YOUR_GOOGLE_MAPS_API_KEY. Check GOOGLE_MAPS_API_KEY / GOOGLE_PLACES_API_KEY secret."
            exit 1
          fi

      - name: Verify build output
        run: |
          ls -la build/web
          test -f build/web/index.html || (echo "Missing build/web/index.html — build may have failed" && exit 1)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::FIREBASE_PROJECT_ID secret is not set. Add it in repo Settings → Secrets and Variables → Actions."
            exit 1
          fi
          firebase deploy --only hosting \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Firebase Hosting deployed successfully!"
          echo "🌐 Live at: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
          echo "📋 Console: https://console.firebase.google.com/project/${{ secrets.FIREBASE_PROJECT_ID }}/hosting"
